title: "Daily Korean Political News"
description: "매일 한국 정치/사회 뉴스를 보수·진보 양쪽 시각으로 요약합니다"
url: "https://zer0-kr.github.io"
baseurl: "/daily-news"
lang: ko

# Build
markdown: kramdown
kramdown:
  input: GFM
  hard_wrap: false

plugins:
  - jekyll-paginate
  - jekyll-seo-tag
  - jekyll-feed

paginate: 14
paginate_path: "/page/:num/"

# Defaults — 모든 post에 layout 자동 적용
defaults:
  - scope:
      path: ""
      type: "posts"
    values:
      layout: "news"

# Exclude
exclude:
  - README.md
  - LICENSE
  - Gemfile
  - Gemfile.lock
